<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flippy! — Memory Match</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff9f0;
      --card-back: #ff6b6b;
      --card-back2: #ff8e53;
      --accent1: #ff6b6b;
      --accent2: #ffd93d;
      --accent3: #6bcb77;
      --accent4: #4d96ff;
      --accent5: #c77dff;
      --text: #2d2d2d;
      --shadow: rgba(0,0,0,0.15);
      --radius: 18px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #ff6b6b, #ffd93d);
      top: -150px; left: -150px;
      animation: blobDrift 8s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #4d96ff, #c77dff);
      bottom: -100px; right: -100px;
      animation: blobDrift 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes blobDrift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    header {
      position: relative; z-index: 1;
      text-align: center;
      padding: 36px 20px 16px;
    }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.8rem, 7vw, 4.2rem);
      color: var(--accent1);
      text-shadow: 4px 4px 0 var(--accent2), 7px 7px 0 rgba(0,0,0,0.07);
      letter-spacing: 1px;
      line-height: 1;
    }
    header p {
      font-size: 1rem;
      color: #888;
      font-weight: 600;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    .stats {
      position: relative; z-index: 1;
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-pill {
      background: #fff;
      border-radius: 50px;
      padding: 10px 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 16px var(--shadow);
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
    }
    .stat-val { font-family: 'Fredoka One', cursive; font-size: 1.3rem; }

    .controls {
      position: relative; z-index: 1;
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      letter-spacing: 0.5px;
      padding: 11px 28px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.15); }
    .btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
    .btn-primary { background: var(--accent1); color: #fff; }

    .diff-btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      padding: 8px 20px;
      border-radius: 50px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      background: #fff;
      color: #aaa;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .diff-btn.active {
      border-color: var(--accent4);
      color: var(--accent4);
      background: #eaf3ff;
    }

    #board {
      position: relative; z-index: 1;
      display: grid;
      gap: 14px;
      padding: 10px;
      max-width: 680px;
      width: 100%;
    }
    #board.cols-4 { grid-template-columns: repeat(4, 1fr); }
    #board.cols-5 { grid-template-columns: repeat(5, 1fr); }
    #board.cols-6 { grid-template-columns: repeat(6, 1fr); }

    .card {
      aspect-ratio: 1;
      perspective: 800px;
      cursor: pointer;
    }
    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: var(--radius);
    }
    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      user-select: none;
    }

    .card-back {
      background: linear-gradient(135deg, var(--card-back), var(--card-back2));
      box-shadow: 0 6px 20px rgba(255,107,107,0.3);
      font-size: 1.8rem;
    }
    .card-back::after {
      content: '';
      position: absolute; inset: 8px;
      border-radius: calc(var(--radius) - 4px);
      border: 2.5px dashed rgba(255,255,255,0.4);
      pointer-events: none;
    }

    .card-front {
      transform: rotateY(180deg);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      box-shadow: 0 6px 24px var(--shadow);
    }
    .card.matched .card-front {
      animation: matchPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes matchPop {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.18); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .color-0  { background: #fff0f0; border: 3px solid #ffcdd2; }
    .color-1  { background: #fff8e1; border: 3px solid #ffe082; }
    .color-2  { background: #e8f5e9; border: 3px solid #a5d6a7; }
    .color-3  { background: #e3f2fd; border: 3px solid #90caf9; }
    .color-4  { background: #f3e5f5; border: 3px solid #ce93d8; }
    .color-5  { background: #fce4ec; border: 3px solid #f48fb1; }
    .color-6  { background: #e0f7fa; border: 3px solid #80deea; }
    .color-7  { background: #fff3e0; border: 3px solid #ffcc80; }
    .color-8  { background: #f1f8e9; border: 3px solid #c5e1a5; }
    .color-9  { background: #ede7f6; border: 3px solid #b39ddb; }
    .color-10 { background: #fafafa; border: 3px solid #eeeeee; }
    .color-11 { background: #e8eaf6; border: 3px solid #9fa8da; }
    .color-12 { background: #e0f2f1; border: 3px solid #80cbc4; }
    .color-13 { background: #fffde7; border: 3px solid #ffd54f; }
    .color-14 { background: #ffccbc; border: 3px solid #ffab91; }

    .shake {
      animation: shake 0.5s cubic-bezier(0.36,0.07,0.19,0.97) both;
    }
    @keyframes shake {
      10%, 90%  { transform: translateX(-2px); }
      20%, 80%  { transform: translateX(4px); }
      30%, 50%, 70% { transform: translateX(-6px); }
      40%, 60%  { transform: translateX(6px); }
      100%      { transform: translateX(0); }
    }

    #win-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(255,249,240,0.93);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }
    #win-overlay.show { display: flex; }
    @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }

    .win-emoji {
      font-size: 5rem;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-20deg); }
      to   { transform: scale(1) rotate(0deg); }
    }
    .win-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      color: var(--accent1);
      text-shadow: 3px 3px 0 var(--accent2);
      margin: 12px 0 6px;
    }
    .win-sub {
      font-size: 1.1rem; color: #888;
      font-weight: 700; margin-bottom: 28px;
    }
    .win-stats {
      display: flex; gap: 20px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 32px;
    }
    .win-stat {
      background: #fff;
      border-radius: 16px;
      padding: 16px 28px;
      box-shadow: 0 4px 16px var(--shadow);
      font-weight: 800; min-width: 110px;
    }
    .win-stat-label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .win-stat-val { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--text); }

    .confetti-piece {
      position: fixed;
      top: -20px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 99;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg) scaleX(1); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg) scaleX(-1); opacity: 0; }
    }

    footer {
      position: relative; z-index: 1;
      padding: 28px;
      color: #ccc;
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <h1>🃏 Flippy!</h1>
  <p>Flip cards · Find pairs · Flex your memory</p>
</header>

<div class="stats">
  <div class="stat-pill">🔄 Moves <span class="stat-val" id="moves-val">0</span></div>
  <div class="stat-pill">⏱️ Time <span class="stat-val" id="time-val">0:00</span></div>
  <div class="stat-pill">✅ Pairs <span class="stat-val" id="pairs-val">0 / 0</span></div>
</div>

<div class="controls">
  <button class="diff-btn active" data-diff="easy">😊 Easy (4×4)</button>
  <button class="diff-btn" data-diff="medium">🔥 Medium (4×5)</button>
  <button class="diff-btn" data-diff="hard">💀 Hard (6×5)</button>
  <button class="btn btn-primary" id="restart-btn">↺ New Game</button>
</div>

<div id="board"></div>

<div id="win-overlay">
  <div class="win-emoji">🎉</div>
  <div class="win-title">You nailed it!</div>
  <div class="win-sub" id="win-sub"></div>
  <div class="win-stats">
    <div class="win-stat">
      <div class="win-stat-label">Moves</div>
      <div class="win-stat-val" id="win-moves"></div>
    </div>
    <div class="win-stat">
      <div class="win-stat-label">Time</div>
      <div class="win-stat-val" id="win-time"></div>
    </div>
    <div class="win-stat">
      <div class="win-stat-label">Score</div>
      <div class="win-stat-val" id="win-score"></div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="startGame()">🎮 Play Again</button>
</div>

<footer>Made with 💛 · Flippy! Memory Match</footer>

<script>
  const EMOJIS = ['🦊','🐸','🦋','🍕','🎸','🚀','🌈','🍉','🦄','🐙','🍦','🎈','🦁','🐳','🎯'];

  const DIFFICULTIES = {
    easy:   { cols: 4, rows: 4, pairs: 8 },
    medium: { cols: 4, rows: 5, pairs: 10 },
    hard:   { cols: 6, rows: 5, pairs: 15 },
  };

  let diff = 'easy';
  let flipped = [], matched = [], locked = false;
  let moves = 0, seconds = 0, timer = null, gameStarted = false;

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      diff = btn.dataset.diff;
      startGame();
    });
  });
  document.getElementById('restart-btn').addEventListener('click', startGame);

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function startGame() {
    clearInterval(timer);
    flipped = []; matched = []; locked = false;
    moves = 0; seconds = 0; gameStarted = false;
    document.getElementById('win-overlay').classList.remove('show');
    updateStats();

    const cfg = DIFFICULTIES[diff];
    const board = document.getElementById('board');
    board.className = `cols-${cfg.cols}`;
    board.innerHTML = '';

    const selectedEmojis = shuffle([...EMOJIS]).slice(0, cfg.pairs);
    const cards = shuffle([...selectedEmojis, ...selectedEmojis].map((emoji, i) => ({
      emoji,
      colorIdx: selectedEmojis.indexOf(emoji),
      id: i
    })));

    document.getElementById('pairs-val').textContent = `0 / ${cfg.pairs}`;

    cards.forEach((card, idx) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.emoji = card.emoji;
      el.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back">✨</div>
          <div class="card-face card-front color-${card.colorIdx}">${card.emoji}</div>
        </div>`;
      el.addEventListener('click', () => onCardClick(el));

      el.style.opacity = '0';
      el.style.transform = 'scale(0.7) rotateY(-30deg)';
      el.style.transition = `opacity 0.35s ease ${idx * 25}ms, transform 0.35s cubic-bezier(0.34,1.56,0.64,1) ${idx * 25}ms`;
      board.appendChild(el);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.opacity = '1';
        el.style.transform = 'scale(1) rotateY(0deg)';
      }));
    });
  }

  function onCardClick(el) {
    if (locked) return;
    if (el.classList.contains('flipped') || el.classList.contains('matched')) return;

    if (!gameStarted) {
      gameStarted = true;
      timer = setInterval(() => { seconds++; updateTimer(); }, 1000);
    }

    el.classList.add('flipped');
    flipped.push(el);

    if (flipped.length === 2) {
      locked = true;
      moves++;
      document.getElementById('moves-val').textContent = moves;
      checkMatch();
    }
  }

  function checkMatch() {
    const [a, b] = flipped;
    if (a.dataset.emoji === b.dataset.emoji) {
      setTimeout(() => {
        a.classList.add('matched');
        b.classList.add('matched');
        matched.push(a, b);
        flipped = [];
        locked = false;
        const cfg = DIFFICULTIES[diff];
        const pairsDone = matched.length / 2;
        document.getElementById('pairs-val').textContent = `${pairsDone} / ${cfg.pairs}`;
        if (pairsDone === cfg.pairs) endGame();
      }, 300);
    } else {
      setTimeout(() => {
        a.classList.add('shake'); b.classList.add('shake');
      }, 100);
      setTimeout(() => {
        a.classList.remove('flipped', 'shake');
        b.classList.remove('flipped', 'shake');
        flipped = [];
        locked = false;
      }, 900);
    }
  }

  function endGame() {
    clearInterval(timer);
    const cfg = DIFFICULTIES[diff];
    const score = Math.max(100, Math.round(cfg.pairs * 500 / ((moves * (seconds + 1)) / 10)));
    const rating = moves <= cfg.pairs + 2 ? '🏆 Perfect game!' :
                   moves <= cfg.pairs * 1.5 ? '⭐ Great memory!' :
                   moves <= cfg.pairs * 2.5 ? '👍 Nice work!' : '💪 Keep it up!';

    document.getElementById('win-moves').textContent = moves;
    document.getElementById('win-time').textContent = formatTime(seconds);
    document.getElementById('win-score').textContent = score;
    document.getElementById('win-sub').textContent = rating;
    document.getElementById('win-overlay').classList.add('show');
    spawnConfetti();
  }

  function updateStats() {
    document.getElementById('moves-val').textContent = moves;
    document.getElementById('time-val').textContent = formatTime(seconds);
    const cfg = DIFFICULTIES[diff];
    document.getElementById('pairs-val').textContent = `0 / ${cfg.pairs}`;
  }
  function updateTimer() {
    document.getElementById('time-val').textContent = formatTime(seconds);
  }
  function formatTime(s) {
    return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }

  function spawnConfetti() {
    const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff8e53','#80deea'];
    for (let i = 0; i < 90; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${1.8 + Math.random() * 2.5}s;
        animation-delay: ${Math.random() * 1.2}s;
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  startGame();
</script>
</body>
</html>
